<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medieval Project - Scrolling Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .gallery-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .scroll-wrapper {
            display: flex;
            flex-direction: row;
            gap: 0;
            animation: scrollLeft 585s linear forwards;
        }

        .scroll-wrapper.paused {
            animation-play-state: paused;
        }

        .image-container {
            height: 100vh;
            min-width: 100vw;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #2c2c2c;
        }

        .image-container img {
            height: 100vh;
            width: 100vw;
            object-fit: cover;
            display: block;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 15px;
        }

        .controls button {
            background-color: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.3s;
        }

        .controls button:hover {
            background-color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
        }

        .speed-indicator {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 18px;
            z-index: 100;
        }

        .paused-indicator {
            position: fixed;
            top: 30px;
            right: 30px;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 8px 15px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            z-index: 100;
            display: none;
        }

        .paused-indicator.show {
            display: block;
        }

        @keyframes scrollLeft {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-1300vw);
            }
        }

        .image-label {
            position: absolute;
            top: 20px;
            right: 30px;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .presentation-mode .controls,
        .presentation-mode .speed-indicator {
            display: none;
        }

        body.presentation-mode.waiting {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="gallery-container">
        <div class="scroll-wrapper" id="scrollWrapper">
            <div class="image-container">
                <img src="Assests/1 The Role of Serfs & Medieval Far Tools .png" alt="Image 1">
            </div>
            <div class="image-container">
                <img src="Assests/2 Manor (Donovan).png" alt="Manor (Donovan)">
            </div>
            <div class="image-container">
                <img src="Assests/3 Crime and Punishment(Hassan).png" alt="Crime and Punishment(Hassan)">
            </div>
            <div class="image-container">
                <img src="Assests/4 Worst Jobs.png" alt="Worst Jobs">
            </div>
            <div class="image-container">
                <img src="Assests/5.png" alt="Image 5">
            </div>
            <div class="image-container">
                <img src="Assests/6.png" alt="Image 6">
            </div>
            <div class="image-container">
                <img src="Assests/7 Castles and Fortification.png" alt="Castles and Fortification">
            </div>
            <div class="image-container">
                <img src="Assests/8 Crusades Journey.png" alt="Crusades Journey">
            </div>
            <div class="image-container">
                <img src="Assests/9 Crusades Fight.png" alt="Crusades Fight">
            </div>
            <div class="image-container">
                <img src="Assests/10 Crusades Leaving.png" alt="Crusades Leaving">
            </div>
            <div class="image-container">
                <img src="Assests/11 Children.png" alt="Children">
            </div>
            <div class="image-container">
                <img src="Assests/12 Black Death.png" alt="Black Death">
            </div>
            <div class="image-container">
                <img src="Assests/13 Church Lutaaya.png" alt="Church Lutaaya">
            </div>
        </div>
    </div>

    <div class="speed-indicator" id="speedIndicator">Speed: Normal</div>
    <div class="paused-indicator" id="pausedIndicator">Paused</div>

    <div class="controls">
        <button onclick="restartScroll()">Restart</button>
        <button onclick="changeSpeed('slow')">Slow</button>
        <button onclick="toggleScroll(this)">Pause</button>
        <button onclick="changeSpeed('normal')">Normal</button>
        <button onclick="changeSpeed('fast')">Fast</button>
    </div>

    <script>
        const scrollWrapper = document.getElementById('scrollWrapper');
        const speedIndicator = document.getElementById('speedIndicator');
        let isPaused = false;
        let currentSpeed = 'normal';

        const speeds = {
            slow: '875s',
            normal: '585s',
            fast: '295s'
        };

        let presentationMode = false;
        let waitingForClick = false;
        let speedBoostActive = false;
        
        // Auto-scroll variables
        let currentImageIndex = 0;
        let autoScrollActive = false;
        const totalImages = 13;
        const pauseTime = 30000; // 30 seconds

        
        // Auto-scroll function
        function autoScroll() {
            if (!autoScrollActive || isPaused || presentationMode) return;
            
            if (currentImageIndex < totalImages) {
                // Scroll to the current image
                const targetX = -currentImageIndex * window.innerWidth;
                scrollWrapper.style.transition = 'transform 4s ease-in-out';
                scrollWrapper.style.transform = `translateX(${targetX}px)`;
                scrollWrapper.style.animation = 'none';
                
                // For slides 8-10 (indices 7-9), do continuous scroll
                if (currentImageIndex === 7) {
                    // Start continuous scroll from slide 8 to 10
                    setTimeout(() => {
                        const endX = -9 * window.innerWidth;
                        scrollWrapper.style.transition = 'transform 30s linear';
                        scrollWrapper.style.transform = `translateX(${endX}px)`;
                        
                        // After continuous scroll, stop at slide 10 for 5 seconds
                        setTimeout(() => {
                            currentImageIndex = 10;
                            setTimeout(() => {
                                autoScroll();
                            }, 5000);
                        }, 30000);
                    }, 4000); // Wait for initial transition
                } else if (currentImageIndex >= 8 && currentImageIndex <= 9) {
                    // Skip these as they're handled by the continuous scroll
                    return;
                } else {
                    // Normal pause for other slides
                    setTimeout(() => {
                        currentImageIndex++;
                        autoScroll();
                    }, pauseTime);
                }
            } else {
                // Restart from beginning
                currentImageIndex = 0;
                autoScroll();
            }
        }


        // Monitor animation progress to speed up between images 8-10
        function checkAnimationProgress() {
            const computedStyle = window.getComputedStyle(scrollWrapper);
            const transform = computedStyle.transform;
            
            if (transform !== 'none') {
                const matrix = new DOMMatrix(transform);
                const translateX = matrix.m41;
                const totalWidth = window.innerWidth * 13; // 13 images
                const progress = Math.abs(translateX) / totalWidth;
                
                // Images 8-10 represent roughly 7/13 to 10/13 of the animation
                const startBoost = 7 / 13;
                const endBoost = 10 / 13;
                
                if (progress >= startBoost && progress <= endBoost && !speedBoostActive && !isPaused) {
                    speedBoostActive = true;
                    scrollWrapper.style.animationDuration = '200s'; // Much faster
                } else if ((progress < startBoost || progress > endBoost) && speedBoostActive && !isPaused) {
                    speedBoostActive = false;
                    scrollWrapper.style.animationDuration = speeds[currentSpeed];
                }
            }
        }

        // Check progress every 100ms
        setInterval(checkAnimationProgress, 100);

        // Keyboard shortcut: Press 'P' for presentation mode
        document.addEventListener('keydown', (e) => {
            if (e.key === 'p' || e.key === 'P') {
                enterPresentationMode();
            }
            if (e.key === 'Escape' && presentationMode) {
                exitPresentationMode();
            }
            if (e.key === ' ') {
                e.preventDefault();
                isPaused = !isPaused;
                const pausedIndicator = document.getElementById('pausedIndicator');
                if (isPaused) {
                    scrollWrapper.classList.add('paused');
                    pausedIndicator.classList.add('show');
                } else {
                    scrollWrapper.classList.remove('paused');
                    pausedIndicator.classList.remove('show');
                    autoScroll();
                }
            }
            if (e.key === 'ArrowRight') {
                e.preventDefault();
                if (currentImageIndex < totalImages - 1) {
                    currentImageIndex++;
                    const targetX = -currentImageIndex * window.innerWidth;
                    scrollWrapper.style.transition = 'transform 8s ease-in-out';
                    scrollWrapper.style.transform = `translateX(${targetX}px)`;
                }
            }
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                if (currentImageIndex > 0) {
                    currentImageIndex--;
                    const targetX = -currentImageIndex * window.innerWidth;
                    scrollWrapper.style.transition = 'transform 8s ease-in-out';
                    scrollWrapper.style.transform = `translateX(${targetX}px)`;
                }
            }
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (currentImageIndex < totalImages - 1) {
                    currentImageIndex++;
                    const targetX = -currentImageIndex * window.innerWidth;
                    scrollWrapper.style.transition = 'transform 8s ease-in-out';
                    scrollWrapper.style.transform = `translateX(${targetX}px)`;
                }
            }
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (currentImageIndex > 0) {
                    currentImageIndex--;
                    const targetX = -currentImageIndex * window.innerWidth;
                    scrollWrapper.style.transition = 'transform 8s ease-in-out';
                    scrollWrapper.style.transform = `translateX(${targetX}px)`;
                }
            }
            if (e.key === 'PageDown') {
                e.preventDefault();
                if (currentImageIndex < totalImages - 1) {
                    currentImageIndex++;
                    const targetX = -currentImageIndex * window.innerWidth;
                    scrollWrapper.style.transition = 'transform 8s ease-in-out';
                    scrollWrapper.style.transform = `translateX(${targetX}px)`;
                }
            }
            if (e.key === 'PageUp') {
                e.preventDefault();
                if (currentImageIndex > 0) {
                    currentImageIndex--;
                    const targetX = -currentImageIndex * window.innerWidth;
                    scrollWrapper.style.transition = 'transform 8s ease-in-out';
                    scrollWrapper.style.transform = `translateX(${targetX}px)`;
                }
            }
        });

        // Click anywhere to start presentation
        document.addEventListener('click', (e) => {
            if (waitingForClick && presentationMode) {
                startPresentation();
            }
        });

        function enterPresentationMode() {
            presentationMode = true;
            waitingForClick = true;
            autoScrollActive = false;
            currentImageIndex = 0;
            document.body.classList.add('presentation-mode', 'waiting');
            scrollWrapper.classList.add('paused');
            scrollWrapper.style.animation = 'none';
            scrollWrapper.style.transform = 'translateX(0)';
        }

        function startPresentation() {
            waitingForClick = false;
            document.body.classList.remove('waiting');
            scrollWrapper.classList.remove('paused');
            autoScrollActive = false;
            currentImageIndex = 0;
            scrollWrapper.style.transform = 'translateX(0)';
        }

        function exitPresentationMode() {
            presentationMode = false;
            waitingForClick = false;
            autoScrollActive = false;
            currentImageIndex = 0;
            scrollWrapper.style.transform = 'translateX(0)';
            document.body.classList.remove('presentation-mode', 'waiting');
        }

        function changeSpeed(speed) {
            currentSpeed = speed;
            scrollWrapper.style.animation = `scrollLeft ${speeds[speed]} linear forwards`;
            speedIndicator.textContent = `Speed: ${speed.charAt(0).toUpperCase() + speed.slice(1)}`;
            
            if (isPaused) {
                scrollWrapper.classList.add('paused');
            }
        }

        function toggleScroll(button) {
            const pausedIndicator = document.getElementById('pausedIndicator');
            if (isPaused) {
                scrollWrapper.classList.remove('paused');
                pausedIndicator.classList.remove('show');
                button.textContent = 'Pause';
                isPaused = false;
                autoScroll(); // Resume auto-scroll
            } else {
                scrollWrapper.classList.add('paused');
                pausedIndicator.classList.add('show');
                button.textContent = 'Resume';
                isPaused = true;
            }
        }

        function restartScroll() {
            currentImageIndex = 0;
            scrollWrapper.style.transition = 'transform 0.5s ease-in-out';
            scrollWrapper.style.transform = 'translateX(0)';
            scrollWrapper.style.animation = 'none';
            setTimeout(() => {
                autoScroll();
            }, 100);
        }


    </script>
</body>
</html>
