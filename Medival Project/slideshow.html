<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medieval Project Slideshow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #2c2c2c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .slideshow-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 600px;
            background-color: #1a1a1a;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .slide-counter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            z-index: 10;
        }

        .controls {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .controls button {
            background-color: rgba(255, 255, 255, 0.3);
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .controls button:hover {
            background-color: rgba(255, 255, 255, 0.5);
        }

        .dots {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .dot.active {
            background-color: white;
        }
    </style>
</head>
<body>
    <div class="slideshow-container">
        <div class="slide active">
            <img src="Assests/1 The Role of Serfs & Medieval Far Tools.png" alt="The Role of Serfs & Medieval Far Tools">
        </div>
        <div class="slide">
            <img src="Assests/2 Job.png" alt="Job">
        </div>
        <div class="slide">
            <img src="Assests/3 Manor (Donovan).png" alt="Manor (Donovan)">
        </div>
        <div class="slide">
            <img src="Assests/4 Crime and Punishment(Hassan).png" alt="Crime and Punishment (Hassan)">
        </div>
        <div class="slide">
            <img src="Assests/5 Worst Jobs.png" alt="Worst Jobs">
        </div>
        <div class="slide">
            <img src="Assests/6.png" alt="Image 6">
        </div>
        <div class="slide">
            <img src="Assests/7 Medieval Entertainment and Sports.png" alt="Medieval Entertainment and Sports">
        </div>
        <div class="slide">
            <img src="Assests/8 Castles and Fortification.png" alt="Castles and Fortification">
        </div>
        <div class="slide">
            <img src="Assests/9 Crusades Journey.png" alt="Crusades Journey">
        </div>
        <div class="slide">
            <img src="Assests/10 Crusades Fight.png" alt="Crusades Fight">
        </div>
        <div class="slide">
            <img src="Assests/11 Crusades Leaving.png" alt="Crusades Leaving">
        </div>
        <div class="slide">
            <img src="Assests/12 Children.png" alt="Children">
        </div>
        <div class="slide">
            <img src="Assests/13 Black Death.png" alt="Black Death">
        </div>
        <div class="slide">
            <img src="Assests/14 Church Lutaaya.png" alt="Church Lutaaya">
        </div>

        <div class="dots">
            <span class="dot active" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
            <span class="dot" onclick="currentSlide(4)"></span>
            <span class="dot" onclick="currentSlide(5)"></span>
            <span class="dot" onclick="currentSlide(6)"></span>
            <span class="dot" onclick="currentSlide(7)"></span>
            <span class="dot" onclick="currentSlide(8)"></span>
            <span class="dot" onclick="currentSlide(9)"></span>
            <span class="dot" onclick="currentSlide(10)"></span>
            <span class="dot" onclick="currentSlide(11)"></span>
            <span class="dot" onclick="currentSlide(12)"></span>
            <span class="dot" onclick="currentSlide(13)"></span>
            <span class="dot" onclick="currentSlide(14)"></span>
        </div>

        <div class="controls">
            <button onclick="changeSlide(-1)">❮ Previous</button>
            <button onclick="toggleAutoPlay()">Pause</button>
            <button onclick="changeSlide(1)">Next ❯</button>
        </div>

        <div class="slide-counter">
            <span id="current-slide">1</span> / 14
        </div>
    </div>

    <script>
        let currentIndex = 0;
        let autoPlayInterval;
        let isPlaying = true;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        const totalSlides = slides.length;
        const slideDelay = 4000; // 4 seconds per slide (slow)

        function showSlide(index) {
            // Stop at boundaries
            if (index >= totalSlides) {
                currentIndex = totalSlides - 1;
                clearInterval(autoPlayInterval);
                isPlaying = false;
                document.querySelector('.controls button:nth-child(2)').textContent = 'Play';
            } else if (index < 0) {
                currentIndex = 0;
            } else {
                currentIndex = index;
            }

            // Remove active class from all slides and dots
            slides.forEach(slide => slide.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));

            // Add active class to current slide and dot
            slides[currentIndex].classList.add('active');
            dots[currentIndex].classList.add('active');
            
            // Update counter
            document.getElementById('current-slide').textContent = currentIndex + 1;
        }

        function changeSlide(direction) {
            showSlide(currentIndex + direction);
        }

        function currentSlide(index) {
            showSlide(index - 1);
        }

        function autoPlay() {
            autoPlayInterval = setInterval(() => {
                changeSlide(1);
            }, slideDelay);
        }

        function toggleAutoPlay() {
            const button = event.target;
            if (isPlaying) {
                clearInterval(autoPlayInterval);
                button.textContent = 'Play';
                isPlaying = false;
            } else {
                autoPlay();
                button.textContent = 'Pause';
                isPlaying = true;
            }
        }

        // Start auto-play when page loads
        autoPlay();

        // Auto-enter fullscreen (present mode) on page load
        function enterFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Safari */
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE11 */
                elem.msRequestFullscreen();
            }
        }

        // Exit fullscreen when ESC is pressed
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape' || event.key === 'Esc') {
                if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) { /* Safari */
                        document.webkitExitFullscreen();
                    } else if (document.msExitFullscreen) { /* IE11 */
                        document.msExitFullscreen();
                    }
                }
            }
        });

        // Automatically enter fullscreen when page loads
        window.addEventListener('load', function() {
            // Small delay to ensure the page is fully loaded
            setTimeout(enterFullscreen, 100);
        });
    </script>
</body>
</html>
